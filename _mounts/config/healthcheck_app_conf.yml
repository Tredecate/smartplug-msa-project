version: 1
api:
  file: openapi.yml
  spec_dir: "./"
  strict_validation: true
  validate_responses: true
  cors:
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_headers: ["*"]
  base_path: "/healthcheck"
services:
  self:
    host: 0.0.0.0
    port: 8120
    healthcheck_interval_secs: 15
    healthcheck_timeout_secs: 5
    health_status_file: "/data/healthchecks.json"
  checklist:
    receiver: http://receiver_svc:8080/receiver/health
    storage: http://storage_svc:8090/storage/health
    processor: http://processor_svc:8100/processor/health
    analyzer: http://analyzer_svc:8110/analyzer/health