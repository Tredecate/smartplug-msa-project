---
- name: Wait for server to be ready
  hosts: all
  remote_user: ec2-user
  gather_facts: false
  tasks:
    - name: Wait for SSH to be available
      ansible.builtin.wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 60

- name: Install prerequisites
  hosts: all
  remote_user: ec2-user
  become: true
  gather_facts: true
  tasks:
    - name: Add docker repository
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable - $basearch
        baseurl: https://download.docker.com/linux/centos/9/$basearch/stable
        gpgcheck: true
        enabled: true
        gpgkey: https://download.docker.com/linux/centos/gpg
    - name: Install git
      ansible.builtin.dnf:
        name: git
        state: present
        update_cache: true
    - name: Install docker
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
    - name: Enable docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

- name: Clone project and run docker compose
  hosts: all
  remote_user: ec2-user
  gather_facts: true
  tasks:
    - name: Clone project repository
      ansible.builtin.git:
        repo: "https://github.com/Tredecate/smartplug-msa-project.git"
        dest: "/home/ec2-user/smartplug-msa-project"
        version: "main"  # noqa: latest
    - name: Run docker compose
      become: true
      community.docker.docker_compose_v2:
        project_src: "/home/ec2-user/smartplug-msa-project"
        state: present
