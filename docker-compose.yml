services:
  dashboard_server:
    build:
      context: ./dashboard
    ports:
      - "8000:80"

  receiver_svc:
    build:
      context: ./receiver
      additional_contexts:
        shared: ./_common
    ports:
      - "8080:8080"
    volumes:
      - ./_mounts/config:/config:ro
      - ./_mounts/logs:/logs
    depends_on:
      kafka:
        condition: service_healthy

  storage_svc:
    build:
      context: ./storage
      additional_contexts:
        shared: ./_common
    expose:
      - "8090"
    volumes:
      - ./_mounts/config:/config:ro
      - ./_mounts/logs:/logs
    depends_on:
      storage_db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  processor_svc:
    build:
      context: ./processor
      additional_contexts:
        shared: ./_common
    ports:
      - "8100:8100"
    volumes:
      - ./_mounts/config:/config:ro
      - ./_mounts/logs:/logs
      - ./_mounts/data/processor:/data
    depends_on:
      - storage_svc

  analyzer_svc:
    build:
      context: ./analyzer
      additional_contexts:
        shared: ./_common
    ports:
      - "8110:8110"
    volumes:
      - ./_mounts/config:/config:ro
      - ./_mounts/logs:/logs
    depends_on:
      kafka:
        condition: service_healthy

  healthcheck_svc:
    build:
      context: ./healthcheck
      additional_contexts:
        shared: ./_common
    ports:
      - "8120:8120"
    volumes:
      - ./_mounts/config:/config:ro
      - ./_mounts/logs:/logs
      - ./_mounts/data/healthcheck:/data

  storage_db:
    image: mysql:9.6
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: storage_service
      MYSQL_PASSWORD: $$torage_5ervice
      MYSQL_DATABASE: readings
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    expose:
      - "9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  kafka-data:
