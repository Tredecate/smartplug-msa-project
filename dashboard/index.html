<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="ACIT3855 statistics application" />
    <script src="updateStats.js"></script>
    <title>Smart-Plug Data Dashboard</title>
</head>

<body>
    <main id="main">
        <div id="messages"></div>
        <div id="header">
            <img src="logo.webp" alt="Logo" id="logo" />
            <h1>Smart-Plug Data Aggregation Dashboard</h1>
        </div>
        <h5 id="last-updated">Last update: <span id="last-updated-value">N/A</span></h5>
        <h2>Statistics</h2>
        <div id="statistics">
            <div id="processing">
                <code id="processing-stats">Placeholder value - processing stats should appear here</code>
            </div>
            <div id="analyzer">
                <code id="analyzer-stats">Placeholder value - analyzer stats should appear here</code>
            </div>
        </div>
        <h2>Most Recent Analyzer Events</h2>
        <div id="analyzer-latest">
            <div>
                <h3>Power Consumption Event</h3>
                <code id="event-energy">
                    No events found.
                </code>
            </div>
            <div>
                <h3>Internal Temperature Event</h3>
                <code id="event-temperature">
                    No events found.
                </code>
            </div>
        </div>
    </main>
</body>

</html>
