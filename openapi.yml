openapi: '3.0.0'
info:
  description: This API stores Wi-Fi smart-plug operational data as forwarded by a receiver service.
  version: '1.0.0'
  title: Smart-plug Operational Data Storage API
  contact:
    email: 'tdezwart@my.bcit.ca'

paths:
  /plug-data/energy-consumed:
    post:
      summary: Stores an energy consumption reading
      operationId: app.store_energy_consumption_reading
      description: Endpoint to store an energy consumption reading from Wi-Fi smart-plugs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnergyConsumedReading'
      responses:
        '201':
          description: Energy consumption reading successfully stored
        '400':
          description: 'Bad request, e.g. malformed JSON or missing required fields'

  /plug-data/internal-temp:
    post:
      summary: Stores an internal temperature reading
      operationId: app.store_internal_temp_reading
      description: Endpoint to store an internal temperature reading from Wi-Fi smart-plugs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTempReading'
      responses:
        '201':
          description: Internal temperature reading successfully stored
        '400':
          description: 'Bad request, e.g. malformed JSON or missing required fields'

components:
  schemas:
    EnergyConsumedReading:
      type: object
      required:
        - plug_id
        - plug_uptime
        - energy_consumed_watt_minutes
        - switch_state
        - reading_timestamp
        - batch_timestamp
      properties:
        plug_id:
          type: string
          format: uuid
          description: Unique identifier for the smart-plug
          example: '9eb73489-5ada-4359-959e-d6bec07c38f7'
        plug_country:
          type: string
          description: ISO 3166-1 alpha-2 country code where the smart-plug is deployed
          example: 'CA'
        plug_uptime:
          type: integer
          description: Uptime of the smart-plug in seconds
          example: 86400
        energy_consumed_watt_minutes:
          type: integer
          description: Energy consumed over the last minute in watt-minutes
          example: 15
        switch_state:
          type: string
          description: State of the smart-plug switch during the reading.
          enum:
            - 'ON'
            - 'OFF'
          example: 'ON'
        reading_timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the reading was taken
          example: '2025-01-13T12:34:59Z'
        batch_timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the batch was sent
          example: '2025-01-13T12:34:59Z'

    InternalTempReading:
      type: object
      required:
        - plug_id
        - plug_uptime
        - internal_temp_celsius
        - thermal_status
        - reading_timestamp
        - batch_timestamp
      properties:
        plug_id:
          type: string
          format: uuid
          description: Unique identifier for the smart-plug
          example: '9eb73489-5ada-4359-959e-d6bec07c38f7'
        plug_country:
          type: string
          description: ISO 3166-1 alpha-2 country code where the smart-plug is deployed
          example: 'CA'
        plug_uptime:
          type: integer
          description: Uptime of the smart-plug in seconds
          example: 86400
        internal_temp_celsius:
          type: number
          description: Internal temperature in degrees Celsius
          example: 30.5
        thermal_status:
          type: string
          description: Thermal safety status of the smart-plug during the reading, based on MCU/SoC temperature thresholds
          enum:
            - NOT_AVAILABLE
            - NORMAL
            - WARNING
            - CRITICAL
          example: 'NORMAL'
        reading_timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the reading was taken
          example: '2025-01-13T12:34:59Z'
        batch_timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the batch was sent
          example: '2025-01-13T12:34:59Z'